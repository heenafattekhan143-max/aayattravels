services:
  # ── BACKEND: FastAPI Python API ─────────────────────────────────────────────
  - type: web
    name: purvitravels-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false           # Set manually in Render dashboard
      - key: SECRET_KEY
        sync: false           # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://purvitravels-frontend.onrender.com

  # ── FRONTEND: React/Vite served by Express (Dynamic Web Service) ─────────────
  - type: web
    name: purvitravels-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://purvitravels-api.onrender.com
      - key: NODE_ENV
        value: production
