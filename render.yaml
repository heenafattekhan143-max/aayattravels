services:
  # ── BACKEND: FastAPI Python API ─────────────────────────────────────────────
  - type: web
    name: purvitravels-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false           # Set this manually in Render dashboard
      - key: SECRET_KEY
        sync: false           # Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://purvitravels-frontend.onrender.com

  # ── FRONTEND: React/Vite Static Site ────────────────────────────────────────
  - type: static
    name: purvitravels-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://purvitravels-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
